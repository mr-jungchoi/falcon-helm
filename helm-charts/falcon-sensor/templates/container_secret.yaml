{{- if .Values.container.enabled }}
{{- if .Values.container.image.pullSecrets.enable }}
{{- $imagePullSecretName := (include "falcon-sensor.container.imagePullSecretName" .) }}
{{- if not ($imagePullSecretName) }}
{{- $registryConfigJson := (include "falcon-sensor.container.registryConfigJson" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $imagePullSecretName | default (printf "%s-pull-secret" (include "falcon-sensor.fullname" .)) }}
  namespace: {{ include "falcon-sensor.namespace" . }}
data:
  .dockerconfigjson: {{ $registryConfigJson }}
type: kubernetes.io/dockerconfigjson
{{- if or .Values.container.image.pullSecrets.namespaces .Values.container.image.pullSecrets.allNamespaces }}
{{- $name := ( $imagePullSecretName | default (printf "%s-pull-secret" (include "falcon-sensor.fullname" .))) }}
{{- $myns := split "," .Values.container.image.pullSecrets.namespaces | default "" -}}
{{- if .Values.container.image.pullSecrets.allNamespaces }}
{{- $myns = list -}}
{{- range $index, $ns := (lookup "v1" "Namespace" "" "").items -}}
  {{ $myns = append $myns $ns.metadata.name }}
{{- end }}
{{- end }}
{{- range $value := $myns }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $value }}
data:
  .dockerconfigjson: {{ $registryConfigJson }}
type: kubernetes.io/dockerconfigjson
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.container.enabled }}
{{- if .Values.container.aitap.aidrCollectorApiToken }}
{{- if not .Values.container.aitap.useExternalSecret }}
{{- $aitapSecretName := (include "falcon-sensor.container.aitapAidrSecretName" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $aitapSecretName }}
  namespace: {{ include "falcon-sensor.namespace" . }}
  labels:
    app: "{{ include "falcon-sensor.name" . }}"
    app.kubernetes.io/name: {{ include "falcon-sensor.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: "container_sensor"
    crowdstrike.com/provider: crowdstrike
    helm.sh/chart: {{ include "falcon-sensor.chart" . }}
stringData:
  .collector-aidr-token: '{{ .Values.container.aitap.aidrCollectorApiToken }}'
type: Opaque
{{- if or .Values.container.aitap.namespaces .Values.container.aitap.allNamespaces }}
{{- $aitapNamespaces := list -}}
{{- if .Values.container.aitap.allNamespaces }}
{{- $filteredNamespaces := include "falcon-sensor.aitapFilteredNamespaces" . | fromJson -}}
{{- $aitapNamespaces = $filteredNamespaces -}}
{{- else }}
{{- $aitapNamespaces = split "," .Values.container.aitap.namespaces -}}
{{- end }}
{{- range $aitapNamespace := $aitapNamespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $aitapSecretName }}
  namespace: {{ $aitapNamespace }}
stringData:
  .collector-aidr-token: '{{ $.Values.container.aitap.aidrCollectorApiToken }}'
type: Opaque
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
